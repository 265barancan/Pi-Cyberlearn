{% extends 'base.html' %}

{% block title %}Kayıt Ol - CyberLearn Pi{% endblock %}

{% block content %}
<div class="flex justify-center items-center h-full pt-12">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
        <h2 class="text-2xl font-bold mb-6 text-center text-white">Yeni Hesap Oluştur</h2>

        <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Şifre</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 bg-gray-900 border border-gray-600 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Kayıt Ol
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-400">Zaten hesabın var mı?
                <a href="{{ url_for('auth.login') }}" class="text-green-400 hover:text-green-300 transition">Giriş
                    Yap</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
